<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>張老師專業心算班 — 家長查詢</title>
<style>
  :root{--bg:#F4F2ED;--surface:#FFF;--border:#E2DFD6;--text:#1A1916;--text2:#6B6860;--text3:#9B998F;--accent:#1D6B4A;--accent-light:#E3F4EC;--red:#C23B2E;--red-light:#FDECEA;--amber:#C47D0E;--amber-light:#FEF3DC;--radius:14px;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'PingFang TC','Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px 40px}
  .header{text-align:center;margin-bottom:24px}
  .logo{font-size:32px;margin-bottom:6px}
  .school{font-size:18px;font-weight:700;color:var(--text)}
  .subtitle{font-size:13px;color:var(--text3);margin-top:3px}
  .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px}
  .student-banner{display:flex;align-items:center;gap:14px}
  .avatar{width:56px;height:56px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .student-name{font-size:22px;font-weight:700;color:var(--accent)}
  .student-sub{font-size:13px;color:var(--text3);margin-top:3px}
  .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px;text-align:center}
  .stat-val{font-size:24px;font-weight:700;margin:4px 0 2px}
  .stat-lbl{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .section-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .attend-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
  .attend-item:last-child{border-bottom:none}
  .attend-date{font-size:13.5px;font-weight:500}
  .attend-time{font-size:12px;color:var(--text3)}
  .tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .tag-green{background:var(--accent-light);color:var(--accent)}
  .tag-red{background:var(--red-light);color:var(--red)}
  .tag-amber{background:var(--amber-light);color:var(--amber)}
  .pay-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
  .pay-row:last-child{border-bottom:none}
  .pay-info{font-size:13.5px}
  .pay-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .pay-amount{font-size:14px;font-weight:600}
  .footer{text-align:center;font-size:12px;color:var(--text3);margin-top:20px}
  .not-found{text-align:center;padding:60px 20px}
  .not-found-icon{font-size:48px;margin-bottom:12px}
  .search-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px}
  .search-title{font-size:15px;font-weight:600;margin-bottom:14px}
  select,input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;margin-bottom:10px}
  select:focus,input:focus{border-color:var(--accent)}
  .btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{opacity:.9}
</style>
</head>

function getParams(){
  const p={};
  location.search.slice(1).split('&').forEach(pair=>{const[k,v]=pair.split('=');if(k)p[decodeURIComponent(k)]=decodeURIComponent(v||'');});
  return p;
}

  const latestPay=myPayments[0];

        <div>

    <div class="card">
      <div class="section-title">最近出席記錄</div>
